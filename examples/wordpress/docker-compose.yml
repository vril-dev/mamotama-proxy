services:
  db:
    image: mariadb:11.4
    environment:
      - MARIADB_DATABASE=wordpress
      - MARIADB_USER=wordpress
      - MARIADB_PASSWORD=wordpress
      - MARIADB_ROOT_PASSWORD=changeme-root-password
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  wordpress:
    image: wordpress:php8.2-apache
    environment:
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
    depends_on:
      - db
    restart: unless-stopped

  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ../../coraza
      dockerfile: Dockerfile
    environment:
      - WAF_LISTEN_ADDR=${WAF_LISTEN_ADDR:-:${WAF_LISTEN_PORT:-9090}}
      - WAF_PROXY_CONFIG_FILE=${WAF_PROXY_CONFIG_FILE:-conf/proxy.json}
      - WAF_PROXY_ROLLBACK_HISTORY_SIZE=${WAF_PROXY_ROLLBACK_HISTORY_SIZE:-8}
      - WAF_LOG_FILE=${WAF_LOG_FILE}
      - WAF_STRICT_OVERRIDE=${WAF_STRICT_OVERRIDE}
      - WAF_API_BASEPATH=${WAF_API_BASEPATH}
      - WAF_BYPASS_FILE=${WAF_BYPASS_FILE}
      - WAF_BOT_DEFENSE_FILE=${WAF_BOT_DEFENSE_FILE}
      - WAF_SEMANTIC_FILE=${WAF_SEMANTIC_FILE}
      - WAF_COUNTRY_BLOCK_FILE=${WAF_COUNTRY_BLOCK_FILE}
      - WAF_RATE_LIMIT_FILE=${WAF_RATE_LIMIT_FILE}
      - WAF_RULES_FILE=${WAF_RULES_FILE}
      - WAF_API_KEY_PRIMARY=${WAF_API_KEY_PRIMARY}
      - WAF_API_KEY_SECONDARY=${WAF_API_KEY_SECONDARY}
      - WAF_API_AUTH_DISABLE=${WAF_API_AUTH_DISABLE}
      - WAF_API_CORS_ALLOWED_ORIGINS=${WAF_API_CORS_ALLOWED_ORIGINS}
      - WAF_CRS_ENABLE=${WAF_CRS_ENABLE}
      - WAF_CRS_SETUP_FILE=${WAF_CRS_SETUP_FILE}
      - WAF_CRS_RULES_DIR=${WAF_CRS_RULES_DIR}
      - WAF_CRS_DISABLED_FILE=${WAF_CRS_DISABLED_FILE}
      - WAF_STORAGE_BACKEND=${WAF_STORAGE_BACKEND:-file}
      - WAF_DB_DRIVER=${WAF_DB_DRIVER:-sqlite}
      - WAF_DB_ENABLED=${WAF_DB_ENABLED:-false}
      - WAF_DB_DSN=${WAF_DB_DSN:-}
      - WAF_DB_PATH=${WAF_DB_PATH:-logs/coraza/mamotama.db}
      - WAF_DB_RETENTION_DAYS=${WAF_DB_RETENTION_DAYS:-30}
      - WAF_ALLOW_INSECURE_DEFAULTS=${WAF_ALLOW_INSECURE_DEFAULTS}
    volumes:
      - ./data/rules:/app/rules
      - ./data/conf:/app/conf
      - ./data/logs/coraza:/app/logs
    ports:
      - "${CORAZA_PORT:-19092}:${WAF_LISTEN_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:${WAF_LISTEN_PORT:-9090}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      - wordpress
    restart: unless-stopped

volumes:
  db_data:
