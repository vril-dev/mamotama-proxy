name: ci

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coraza/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache-dependency-path: coraza/src/go.sum
      - name: Run unit tests
        run: go test ./...

  mysql-logstore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache-dependency-path: coraza/src/go.sum

      - name: Prepare env file
        run: cp .env.example .env

      - name: Start MySQL container
        run: docker compose --profile mysql up -d mysql

      - name: Wait for MySQL healthy
        run: |
          for i in $(seq 1 60); do
            if docker compose --profile mysql exec -T mysql mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD:-mamotama-root}" --silent >/dev/null 2>&1; then
              echo "mysql is ready"
              exit 0
            fi
            sleep 2
          done
          echo "mysql did not become healthy in time" >&2
          docker compose --profile mysql ps mysql || true
          docker compose --profile mysql logs mysql || true
          exit 1

      - name: Run MySQL log-store integration test
        working-directory: coraza/src
        env:
          WAF_TEST_MYSQL_DSN: mamotama:mamotama@tcp(127.0.0.1:13306)/mamotama?charset=utf8mb4&parseTime=true
        run: go test ./internal/handler -run TestLogsStatsMySQLStoreAggregatesAndIngestsIncrementally -count=1

      - name: Tear down MySQL container
        if: always()
        run: docker compose --profile mysql down -v

  ui-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/mamotama-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/mamotama-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run UI tests
        run: npm test
      - name: Run UI build
        run: npm run build

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose
        run: docker compose config >/dev/null

  waf-test:
    name: waf-test (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: file
            storage_backend: "file"
            db_driver: "sqlite"
            expect_sqlite_artifact: "false"
          - mode: sqlite
            storage_backend: "db"
            db_driver: "sqlite"
            expect_sqlite_artifact: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Install CRS
        run: ./scripts/install_crs.sh

      - name: Configure app config for matrix
        env:
          STORAGE_BACKEND: ${{ matrix.storage_backend }}
          DB_DRIVER: ${{ matrix.db_driver }}
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          jq --arg backend "${STORAGE_BACKEND}" --arg driver "${DB_DRIVER}" '
            .server.listen_addr = ":9090" |
            .storage.backend = $backend |
            .storage.db_driver = $driver |
            .storage.db_retention_days = 30
          ' data/conf/config.json > "${tmp}"
          mv "${tmp}" data/conf/config.json

      - name: Coraza smoke check
        env:
          WAF_LISTEN_PORT: "9090"
          WAF_API_KEY_PRIMARY: "dev-only-change-this-key-please"
        run: |
          set -euo pipefail
          cleanup() {
            PUID="$(id -u)" GUID="$(id -g)" CORAZA_PORT=19090 docker compose down --remove-orphans >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          PUID="$(id -u)" \
          GUID="$(id -g)" \
          CORAZA_PORT=19090 \
          docker compose up -d --build coraza proxy-echo

          for i in $(seq 1 60); do
            code="$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:19090/healthz" || true)"
            if [[ "${code}" == "200" ]]; then
              break
            fi
            sleep 1
          done

          code="$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:19090/healthz" || true)"
          if [[ "${code}" != "200" ]]; then
            echo "coraza health check failed: ${code}" >&2
            docker compose ps coraza || true
            docker compose logs --tail=120 coraza || true
            exit 1
          fi

          attack_code="$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:19090/?q=<script>alert(1)</script>" || true)"
          if [[ "${attack_code}" != "403" ]]; then
            echo "expected 403 for basic XSS probe, got ${attack_code}" >&2
            docker compose logs --tail=120 coraza || true
            exit 1
          fi

          HOST_CORAZA_PORT=19090 ./scripts/ci_proxy_admin_smoke.sh

      - name: Run GoTestWAF
        env:
          GOTESTWAF_AUTO_DOWN: "1"
          MIN_BLOCKED_RATIO: "70"
          WAF_LISTEN_PORT: "9090"
        run: ./scripts/run_gotestwaf.sh

      - name: Validate SQLite DB artifact
        if: matrix.expect_sqlite_artifact == 'true'
        run: |
          if [[ ! -s data/logs/coraza/mamotama.db ]]; then
            echo "expected sqlite db file was not generated" >&2
            ls -la data/logs/coraza || true
            exit 1
          fi

      - name: Publish GoTestWAF summary
        if: always()
        run: |
          if [[ -f data/logs/gotestwaf/gotestwaf-report-summary.md ]]; then
            cat data/logs/gotestwaf/gotestwaf-report-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload GoTestWAF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gotestwaf-report-${{ matrix.mode }}
          path: |
            data/logs/gotestwaf/gotestwaf-report.json
            data/logs/gotestwaf/gotestwaf-report-summary.txt
            data/logs/gotestwaf/gotestwaf-report-summary.md
            data/logs/coraza/mamotama.db
          if-no-files-found: warn
