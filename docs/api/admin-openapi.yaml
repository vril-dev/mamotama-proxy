        '200':
          description: Rollback applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /mamotama-api/fp-tuner/propose:
    post:
      tags: [fp-tuner]
      summary: Propose a scoped false-positive tuning rule
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FPTunerProposeRequest'
      responses:
        '200':
          description: Proposal generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /mamotama-api/fp-tuner/apply:
    post:
      tags: [fp-tuner]
      summary: Validate or apply a scoped false-positive tuning rule
      parameters:
        - $ref: '#/components/parameters/IfMatchHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FPTunerApplyRequest'
      responses:
        '200':
          description: Proposal applied or simulated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
    IfMatchRequiredHeader:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
    LogSource:
      name: src
      in: query
      required: true
      schema:
        type: string
        enum: [waf]
    TailQuery:
      name: tail
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    DirQuery:
      name: dir
      in: query
      required: false
      schema:
        type: string
        enum: [prev]
    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: integer
        format: int64
    CountryQuery:
      name: country
      in: query
      required: false
      schema:
        type: string
    HoursQuery:
      name: hours
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ScanQuery:
      name: scan
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    FromQuery:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    ToQuery:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Optimistic concurrency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictResponse'
    PreconditionRequired:
      description: Required precondition header is missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unprocessable:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationResult'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AdditionalPropertiesObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      additionalProperties: true
    ConflictResponse:
      type: object
      properties:
        error:
          type: string
        currentETag:
          type: string
      additionalProperties: true
    ValidationResult:
      type: object
      properties:
        ok:
          type: boolean
        messages:
          type: array
          items:
            type: string
      additionalProperties: true
    UpdateResult:
      type: object
      properties:
        ok:
          type: boolean
        etag:
          type: string
      additionalProperties: true
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
      additionalProperties: true
    RootDiscoveryResponse:
      type: object
      properties:
        message:
          type: string
        endpoints:
          type: array
          items:
            type: string
      additionalProperties: true
    StatusResponse:
      type: object
      additionalProperties: true
      description: |
        Runtime status object. Includes WAF state, proxy routing and health state, TLS/ACME
        state, notification counters, IP reputation state, semantic counters, cache-store stats,
        and storage backend metadata.
    RulesFilesResponse:
      type: object
      properties:
        rules:
          type: object
          additionalProperties:
            type: string
        files:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              raw:
                type: string
              etag:
                type: string
              error:
                type: string
            additionalProperties: true
      additionalProperties: true
    GenericConfigResponse:
      type: object
      properties:
        etag:
          type: string
        raw:
          type: string
      additionalProperties: true
    LogsReadResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            type: object
            additionalProperties: true
        next_cursor:
          type: integer
          format: int64
        page_start:
          type: integer
          format: int64
        page_end:
          type: integer
          format: int64
        has_more:
          type: boolean
        has_prev:
          type: boolean
        has_next:
          type: boolean
      additionalProperties: true
    LogsStatsResponse:
      type: object
      additionalProperties: true
    RawRequest:
      type: object
      required: [raw]
      properties:
        raw:
          type: string
    RuleFilePutRequest:
      type: object
      required: [path, raw]
      properties:
        path:
          type: string
        raw:
          type: string
    CacheRulesRequest:
      type: object
      properties:
        rawMode:
          type: boolean
        raw:
          type: string
        rules:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: false
    CacheStoreRequest:
      type: object
      properties:
        enabled:
          type: boolean
        store_dir:
          type: string
        max_bytes:
          type: integer
          format: int64
      additionalProperties: false
    CRSRuleSetsRequest:
      type: object
      properties:
        enabled:
          type: array
          items:
            type: string
      additionalProperties: false
    NotificationTestRequest:
      type: object
      properties:
        note:
          type: string
    ProxyProbeRequest:
      type: object
      properties:
        raw:
          type: string
        timeout_ms:
          type: integer
          minimum: 0
      additionalProperties: false
    ProxyDryRunRequest:
      type: object
      required: [path]
      properties:
        raw:
          type: string
        host:
          type: string
        path:
          type: string
      additionalProperties: false
    FPTunerEventInput:
      type: object
      properties:
        event_id:
          type: string
        event_type:
          type: string
        observed_at:
          type: string
          format: date-time
        method:
          type: string
        path:
          type: string
        policy:
          type: string
        rule_id:
          type: integer
        status:
          type: integer
        score:
          type: integer
        reason:
          type: string
        matched_variable:
          type: string
        matched_value:
          type: string
      additionalProperties: false
    FPTunerProposal:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        reason:
          type: string
        confidence:
          type: number
        target_path:
          type: string
        rule_line:
          type: string
      additionalProperties: false
    FPTunerProposeRequest:
      type: object
      properties:
        event:
          $ref: '#/components/schemas/FPTunerEventInput'
        events:
          type: array
          items:
            $ref: '#/components/schemas/FPTunerEventInput'
        target_path:
          type: string
      additionalProperties: false
    FPTunerApplyRequest:
      type: object
      required: [proposal]
      properties:
        proposal:
          $ref: '#/components/schemas/FPTunerProposal'
        simulate:
          type: boolean
        approval_token:
          type: string
      additionalProperties: false
