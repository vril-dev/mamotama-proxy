services:    
  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mamotama}
      - MYSQL_USER=${MYSQL_USER:-mamotama}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-mamotama}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-mamotama-root}
      - TZ=${MYSQL_TZ:-UTC}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped
  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ./coraza
      dockerfile: Dockerfile
    environment:
      - WAF_CONFIG_FILE=${WAF_CONFIG_FILE:-conf/config.json}
    volumes:
      - ./data/rules:/app/rules
      - ./data/conf:/app/conf
      - ./data/logs:/app/logs
    ports:
      - "${CORAZA_PORT:-9090}:${WAF_LISTEN_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:${WAF_LISTEN_PORT:-9090}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
  gotestwaf:
    image: wallarm/gotestwaf:0.5.8@sha256:ff7184da90029a98c87bfdbadcee544c979b999593175d17b2d38f642ee29977
    user: "${PUID}:${GUID}"
    profiles: ["waf-test"]
    depends_on:
      coraza:
        condition: service_healthy
    command:
      - --url=${GOTESTWAF_TARGET_URL:-http://coraza:${WAF_LISTEN_PORT:-9090}}
      - --wafName=mamotama
      - --reportFormat=json
      - --reportPath=/app/reports
      - --reportName=gotestwaf-report
      - --noEmailReport
    volumes:
      - ./data/logs/gotestwaf:/app/reports
    restart: "no"

volumes:
  mysql_data:
